name: PHPUnit Tests

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.1', '8.2', '8.3']

    name: PHP ${{ matrix.php-versions }} Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: pcre, mbstring, xml, curl, gd, pdo_mysql, zip, intl
          coverage: xdebug

      - name: Install dependencies (if composer.json exists)
        run: |
          if [ -f composer.json ]; then
            composer validate --strict
            composer install --prefer-dist --no-progress
          else
            echo "No composer.json found, skipping dependency installation."
          fi

      - name: Run PHPUnit (if available)
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --coverage-clover=coverage.xml
          else
            echo "PHPUnit not available, skipping tests."
          fi

      - name: Upload coverage to Codecov
        if: matrix.php-versions == '8.3' && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
